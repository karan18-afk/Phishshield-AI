<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PhishShield AI - URL Security Scanner</title>

<style>

*{
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
   margin:0;
    min-height:100vh;
    background:#020617;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
    background:#0f172a;
}

.logo{
    font-size:28px;
    color:#22d3ee;
    font-weight:bold;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.menu a:hover{
    color:#22d3ee;
}


/* Animated background */

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#00ffff;
    filter:blur(180px);
    opacity:0.25;
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{
        transform:translate(-200px,-100px);
    }
    to{
        transform:translate(200px,100px);
    }
}


.container{

    width:700px;
    padding:35px;

    margin:60px auto;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);

    border-radius:25px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 40px rgba(0,255,255,0.25);

}


.logo{

    text-align:center;
    font-size:32px;
    color:#22d3ee;
    font-weight:700;

}


.subtitle{

    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;

}


input{

    width:100%;
    padding:16px;

    border-radius:12px;
    border:none;

    background:#0f172a;

    color:white;

    font-size:16px;

    outline:none;

}


button{

    width:100%;

    margin-top:15px;

    padding:15px;

    border-radius:12px;

    border:none;

    background:#22d3ee;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}


button:hover{

    box-shadow:0 0 25px #22d3ee;

    transform:translateY(-3px);

}



.card{

    margin-top:25px;

    padding:20px;

    background:#0f172a;

    border-radius:15px;

}



#status{

    font-size:24px;

    text-align:center;

    font-weight:bold;

}


.progress{

    height:20px;

    background:#1e293b;

    border-radius:20px;

    overflow:hidden;

    margin-top:15px;

}


#bar{

    height:100%;

    width:0%;

    transition:1s;

    background:linear-gradient(
    90deg,
    #22c55e,
    #eab308,
    #ef4444
    );

}



ul{

    color:#cbd5e1;

}


.footer{

    text-align:center;

    margin-top:20px;

    color:#64748b;

    font-size:13px;

}

</style>

</head>

<body>
    
<nav>

<div class="logo">
<h2>🛡️ PhishShield AI</h2>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="how.html">How It Works</a>
<a href="scanner.html">Scanner</a>
</div>

</nav>


<div class="container">

<div class="subtitle">
Advanced URL Threat Detection System
</div>



<input 
id="url"
placeholder="Enter website URL (https://example.com)"
>


<button onclick="scanURL()">
🔍 Scan Website
</button>



<div class="card">


<div id="status">
Waiting for scan...
</div>


<div class="progress">

<div id="bar"></div>

</div>



<h3>Security Report</h3>

<ul id="report">

<li>No scan performed</li>

</ul>


</div>



<div class="footer">

Cybersecurity Project • URL Analysis Engine

</div>


</div>





<script>


function scanURL(){
    document.getElementById("status").innerHTML =
    "Scanning...";
    document.getElementById("bar").style.width = "0%";
    document.getElementById("report").innerHTML =
    "<li>Analyzing URL...</li>";


let 
url=document.getElementById("url").value.trim();

if(!url.startsWith("http://") && !
url.startsWith("https://")){
    url="http://"+url;
}

let score=0;

let reasons=[];




if(!url){

alert("Enter a URL first");

return;

}


try{

document.getElementById("status").innerHTML="🔍 Scanning...";
document.getElementById("bar").style.width="30%";

let site=new URL(url);

let domain=site.hostname;



// IP detection

if(/^(\d{1,3}\.){3}\d{1,3}$/.test(domain)){

score+=30;

reasons.push(
"Uses IP address instead of domain"
);

}



// Long URL

if(url.length>75){

score+=15;

reasons.push(
"Unusually long URL"
);

}



// @ symbol

if(url.includes("@")){

score+=25;

reasons.push(
"Contains suspicious @ symbol"
);

}



// HTTPS

if(site.protocol!="https:"){

score+=15;

reasons.push(
"No HTTPS encryption"
);

}



// hyphen

if(domain.split("-").length>2){

score+=15;

reasons.push(
"Multiple hyphens in domain"
);

}



let status;


if(score>=60){

status="🚨 HIGH RISK - PHISHING";

}

else if(score>=30){

status="⚠️ SUSPICIOUS WEBSITE";

}

else{

status="✅ SAFE WEBSITE";

}



document.getElementById("status").innerHTML=status;


document.getElementById("bar").style.width=
Math.min(score,100)+"%";



let list=document.getElementById("report");

list.innerHTML="";


if(reasons.length==0){

list.innerHTML=
"<li>No suspicious activity detected</li>";

}

else{

reasons.forEach(r=>{

let li=document.createElement("li");

li.innerHTML="⚠️ "+r;

list.appendChild(li);

});

}



}

catch{


document.getElementById("status").innerHTML=
"❌ Invalid URL";


}



}


</script>


</body>
</html>
